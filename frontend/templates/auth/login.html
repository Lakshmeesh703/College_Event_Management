{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block body_class %}login-page{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
      <h3>Welcome back</h3>
      <p class="muted">Sign in to continue</p>
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <label for="email">Email or full name</label>
      <input type="text" id="email" name="email" required autocomplete="username" placeholder="you@example.com or your full name">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">

      <label class="auth-check"><input type="checkbox" id="show_password_login"> Show password</label>

      <button type="submit" class="full-btn">Login</button>
      <p class="auth-forgot"><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>

      <div class="auth-divider"><span>Public Access</span></div>
      <div class="auth-create">
        <a class="btn btn-light auth-create-btn" href="{{ url_for('main.calendar_view') }}">Explore Events</a>
        <a class="btn btn-light auth-create-btn" href="{{ url_for('main.lookup_results') }}">View Results</a>
        <a class="btn auth-create-btn" href="{{ url_for('auth.signup') }}">Create Account</a>
      </div>
    </form>
  </div>
</div>

<script>
  (function () {
    const password = document.getElementById('password');
    const toggle = document.getElementById('show_password_login');
    if (!password || !toggle) return;
    toggle.addEventListener('change', function () {
      password.type = toggle.checked ? 'text' : 'password';
    });
  })();
</script>
{% endblock %}
