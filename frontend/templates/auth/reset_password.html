{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}
<h2>Reset password</h2>
<p class="muted">Enter your email, OTP, and a new password.</p>
<form method="post" class="card">
  <label for="email">Email</label>
  <input type="email" id="email" name="email" required value="{{ email or '' }}" autocomplete="email">

  <label for="otp_code">OTP code</label>
  <input type="text" id="otp_code" name="otp_code" required minlength="6" maxlength="6" pattern="\d{6}" placeholder="123456">

  <label for="password">New password</label>
  <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">

  <label for="confirm_password">Confirm new password</label>
  <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
  <label><input type="checkbox" id="show_password_reset"> Show password</label>

  <button type="submit">Reset password</button>
</form>
<p><a href="{{ url_for('auth.login') }}">Back to login</a></p>

<script>
  (function () {
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');
    const toggle = document.getElementById('show_password_reset');
    if (!password || !confirm || !toggle) return;
    toggle.addEventListener('change', function () {
      const mode = toggle.checked ? 'text' : 'password';
      password.type = mode;
      confirm.type = mode;
    });
  })();
</script>
{% endblock %}
