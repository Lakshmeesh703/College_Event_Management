{% extends "base.html" %}
{% block title %}Forgot password{% endblock %}
{% block content %}
<h2>Forgot password</h2>
<p class="muted">Enter your email to receive a 6-digit OTP for password reset.</p>
<p class="muted">Use the same email that you used while creating your student account.</p>
<form method="post" class="card">
  <label for="email">Email</label>
  <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
  <button type="submit">Send OTP</button>
</form>
<p><a href="{{ url_for('auth.login') }}">Back to login</a></p>
{% endblock %}
